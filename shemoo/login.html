<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shemo – Login & Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #D4537E;
    --rose-light: #F4C0D1;
    --rose-pale: #FBEAF0;
    --gold: #EF9F27;
    --gold-light: #FAC775;
    --dark: #1a1018;
    --text: #3a2535;
    --muted: #8a6f7e;
    --white: #fff;
    --bg: #fdf8fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5%;
    background: rgba(253,248,250,0.95);
    border-bottom: 1px solid var(--rose-light);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--rose); letter-spacing: 2px;
    text-decoration: none;
  }
  .logo span { color: var(--gold); font-style: italic; }
  .nav-back {
    font-size: 0.88rem; color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 0.4rem;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--rose); }

  /* MAIN LAYOUT */
  .auth-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .auth-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 70% at 80% 50%, #fce4ef 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 10% 80%, #fef4e0 0%, transparent 55%),
                var(--bg);
    z-index: 0;
  }

  /* CARD */
  .auth-card {
    position: relative; z-index: 1;
    background: var(--white);
    border-radius: 28px;
    border: 1px solid var(--rose-light);
    padding: 2.5rem 2rem;
    width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(212,83,126,0.1);
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .auth-logo {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--rose); letter-spacing: 2px;
    margin-bottom: 0.3rem;
  }
  .auth-logo span { color: var(--gold); font-style: italic; }
  .auth-tagline {
    text-align: center; font-size: 0.85rem;
    color: var(--muted); margin-bottom: 2rem;
  }

  /* TABS */
  .auth-tabs {
    display: flex; background: var(--rose-pale);
    border-radius: 50px; padding: 4px;
    margin-bottom: 1.8rem;
  }
  .tab-btn {
    flex: 1; padding: 0.6rem;
    border: none; background: transparent;
    border-radius: 50px; cursor: pointer;
    font-size: 0.9rem; font-weight: 500;
    color: var(--muted); transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab-btn.active {
    background: var(--white);
    color: var(--rose);
    box-shadow: 0 2px 8px rgba(212,83,126,0.15);
  }

  /* FORMS */
  .auth-form { display: none; }
  .auth-form.active { display: block; }

  .form-group { margin-bottom: 1.1rem; }
  .form-label {
    display: block; font-size: 0.82rem; font-weight: 500;
    color: var(--text); margin-bottom: 0.4rem;
  }
  .form-input {
    width: 100%; padding: 0.75rem 1rem;
    border: 1.5px solid var(--rose-light);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; color: var(--text);
    background: var(--bg); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(212,83,126,0.1);
  }
  .form-input::placeholder { color: #c5b0bb; }

  /* PASSWORD FIELD */
  .password-wrap { position: relative; }
  .toggle-pass {
    position: absolute; right: 1rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--muted);
  }

  /* GENDER */
  .gender-options { display: flex; gap: 0.75rem; }
  .gender-opt { flex: 1; }
  .gender-opt input { display: none; }
  .gender-card {
    display: flex; align-items: center; justify-content: center;
    gap: 0.4rem; padding: 0.6rem;
    border: 1.5px solid var(--rose-light);
    border-radius: 10px; background: var(--bg);
    font-size: 0.85rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.18s;
  }
  .gender-opt input:checked + .gender-card {
    border-color: var(--rose); background: var(--rose-pale); color: var(--rose);
  }

  /* ERROR / SUCCESS */
  .form-msg {
    display: none; font-size: 0.83rem;
    padding: 0.6rem 1rem; border-radius: 10px;
    margin-bottom: 1rem;
  }
  .form-msg.error { background: #fbeaf0; color: #993556; display: block; }
  .form-msg.success { background: #e1f5ee; color: #0f6e56; display: block; }

  /* SUBMIT BTN */
  .auth-btn {
    width: 100%; padding: 0.9rem;
    background: var(--rose); color: var(--white);
    border: none; border-radius: 50px;
    font-size: 1rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .auth-btn:hover { background: #b3415f; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(212,83,126,0.25); }
  .auth-btn:disabled { background: var(--rose-light); cursor: not-allowed; transform: none; box-shadow: none; }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 1rem;
    margin: 1.2rem 0; color: var(--muted); font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--rose-light);
  }

  /* GOOGLE BTN */
  .google-btn {
    width: 100%; padding: 0.8rem;
    background: var(--white); color: var(--text);
    border: 1.5px solid var(--rose-light); border-radius: 50px;
    font-size: 0.92rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
  }
  .google-btn:hover { border-color: var(--rose); background: var(--rose-pale); }

  /* FORGOT */
  .forgot-link {
    display: block; text-align: right;
    font-size: 0.8rem; color: var(--rose);
    text-decoration: none; margin-top: -0.6rem;
    margin-bottom: 1rem;
  }
  .forgot-link:hover { text-decoration: underline; }

  /* TERMS */
  .terms {
    font-size: 0.78rem; color: var(--muted);
    text-align: center; margin-top: 1rem; line-height: 1.6;
  }
  .terms a { color: var(--rose); text-decoration: none; }

  /* USER GREETING (shown after login) */
  .user-greeting {
    display: none;
    text-align: center; padding: 1rem 0;
  }
  .user-greeting .avatar-big {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--rose); color: var(--white);
    font-size: 1.8rem; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  .user-greeting h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--dark); margin-bottom: 0.4rem;
  }
  .user-greeting p { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.5rem; }
  .go-shop-btn {
    display: inline-block; padding: 0.85rem 2rem;
    background: var(--rose); color: var(--white);
    border-radius: 50px; text-decoration: none;
    font-size: 0.95rem; font-weight: 500;
    transition: all 0.2s;
  }
  .go-shop-btn:hover { background: #b3415f; }
  .logout-btn {
    display: block; margin-top: 1rem;
    background: none; border: none; color: var(--muted);
    font-size: 0.85rem; cursor: pointer; text-decoration: underline;
    font-family: 'DM Sans', sans-serif; width: 100%; text-align: center;
  }

  /* FLOATING DECORATIONS */
  .deco {
    position: absolute; border-radius: 50%;
    background: var(--rose-pale); opacity: 0.5; z-index: 0;
    animation: floatDeco 5s ease-in-out infinite;
  }
  .deco1 { width: 180px; height: 180px; top: 5%; left: -60px; animation-delay: 0s; }
  .deco2 { width: 120px; height: 120px; bottom: 10%; right: -40px; animation-delay: 1.5s; }
  .deco3 { width: 80px; height: 80px; top: 40%; right: 5%; animation-delay: 0.8s; background: #fef4e0; }
  @keyframes floatDeco { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  @media(max-width:480px) {
    .auth-card { padding: 2rem 1.2rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="shemo.html">She<span>mo</span></a>
  <a class="nav-back" href="shemo.html">← Back to Shop</a>
</nav>

<!-- DECORATIONS -->
<div class="deco deco1"></div>
<div class="deco deco2"></div>
<div class="deco deco3"></div>

<!-- AUTH WRAPPER -->
<div class="auth-wrapper">
  <div class="auth-bg"></div>

  <div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">She<span>mo</span></div>
    <div class="auth-tagline">✨ Beauty delivered in 30 minutes</div>

    <!-- GREETING (shown after login) -->
    <div class="user-greeting" id="user-greeting">
      <div class="avatar-big" id="greeting-avatar">A</div>
      <h2 id="greeting-name">Welcome back!</h2>
      <p id="greeting-email">you@example.com</p>
      <a class="go-shop-btn" href="shemo.html">🛍️ Continue Shopping</a>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <!-- AUTH FORMS -->
    <div id="auth-forms">
      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- ERROR/SUCCESS MSG -->
      <div class="form-msg" id="form-msg"></div>

      <!-- LOGIN FORM -->
      <div class="auth-form active" id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="login-pass" placeholder="Enter your password" />
            <button class="toggle-pass" onclick="togglePass('login-pass', this)" type="button">👁️</button>
          </div>
        </div>
        <a class="forgot-link" href="#" onclick="forgotPassword()">Forgot password?</a>
        <button class="auth-btn" onclick="login()">Login to Shemo</button>
        <div class="divider">or</div>
        <button class="google-btn" onclick="googleAuth()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <p class="terms">By logging in you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form" id="signup-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="e.g. Priya Sharma" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="signup-phone" placeholder="10-digit mobile number" maxlength="10" />
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <div class="gender-options">
            <label class="gender-opt">
              <input type="radio" name="gender" value="Female" checked />
              <div class="gender-card">👩 Female</div>
            </label>
            <label class="gender-opt">
              <input type="radio" name="gender" value="Male" />
              <div class="gender-card">👨 Male</div>
            </label>
            <label class="gender-opt">
              <input type="radio" name="gender" value="Other" />
              <div class="gender-card">🧑 Other</div>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="signup-pass" placeholder="Min. 8 characters" />
            <button class="toggle-pass" onclick="togglePass('signup-pass', this)" type="button">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="signup-confirm" placeholder="Re-enter password" />
            <button class="toggle-pass" onclick="togglePass('signup-confirm', this)" type="button">👁️</button>
          </div>
        </div>
        <button class="auth-btn" onclick="signup()">Create My Account</button>
        <div class="divider">or</div>
        <button class="google-btn" onclick="googleAuth()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <p class="terms">By signing up you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
      </div>
    </div>

  </div>
</div>

<script>
  // ── TAB SWITCHING ──
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
    clearMsg();
  }

  // ── PASSWORD TOGGLE ──
  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
  }

  // ── MESSAGES ──
  function showMsg(msg, type) {
    const el = document.getElementById('form-msg');
    el.textContent = msg; el.className = 'form-msg ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('form-msg');
    el.className = 'form-msg'; el.textContent = '';
  }

  // ── LOCAL STORAGE USERS DB ──
  function getUsers() { return JSON.parse(localStorage.getItem('shemo_users') || '[]'); }
  function saveUsers(u) { localStorage.setItem('shemo_users', JSON.stringify(u)); }
  function setSession(user) { localStorage.setItem('shemo_session', JSON.stringify(user)); }
  function getSession() { return JSON.parse(localStorage.getItem('shemo_session') || 'null'); }
  function clearSession() { localStorage.removeItem('shemo_session'); }

  // ── LOGIN ──
  function login() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    clearMsg();
    if (!email || !pass) { showMsg('Please fill in all fields.', 'error'); return; }
    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === btoa(pass));
    if (!user) { showMsg('Invalid email or password. Please try again.', 'error'); return; }
    setSession(user);
    showMsg('Login successful! Redirecting...', 'success');
    setTimeout(() => showGreeting(user), 800);
  }

  // ── SIGNUP ──
  function signup() {
    const name    = document.getElementById('signup-name').value.trim();
    const email   = document.getElementById('signup-email').value.trim();
    const phone   = document.getElementById('signup-phone').value.trim();
    const pass    = document.getElementById('signup-pass').value;
    const confirm = document.getElementById('signup-confirm').value;
    const gender  = document.querySelector('input[name="gender"]:checked').value;
    clearMsg();
    if (!name || !email || !phone || !pass || !confirm) { showMsg('Please fill in all fields.', 'error'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('Please enter a valid email address.', 'error'); return; }
    if (!/^\d{10}$/.test(phone)) { showMsg('Please enter a valid 10-digit phone number.', 'error'); return; }
    if (pass.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
    if (pass !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
    const users = getUsers();
    if (users.find(u => u.email === email)) { showMsg('An account with this email already exists.', 'error'); return; }
    const newUser = { name, email, phone, gender, password: btoa(pass), createdAt: new Date().toISOString() };
    users.push(newUser);
    saveUsers(users);
    setSession(newUser);
    showMsg('Account created successfully! Welcome to Shemo 🌸', 'success');
    setTimeout(() => showGreeting(newUser), 900);
  }

  // ── GOOGLE AUTH (placeholder) ──
  function googleAuth() {
    showMsg('Google Sign-In requires Firebase setup. Use email/password for now.', 'error');
  }

  // ── FORGOT PASSWORD ──
  function forgotPassword() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('Enter your email above first, then click Forgot Password.', 'error'); return; }
    const users = getUsers();
    if (!users.find(u => u.email === email)) { showMsg('No account found with this email.', 'error'); return; }
    showMsg('Password reset link sent to ' + email + ' (demo mode — check console).', 'success');
  }

  // ── SHOW GREETING ──
  function showGreeting(user) {
    document.getElementById('auth-forms').style.display = 'none';
    const g = document.getElementById('user-greeting');
    g.style.display = 'block';
    document.getElementById('greeting-avatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('greeting-name').textContent = 'Hi, ' + user.name.split(' ')[0] + '! 🌸';
    document.getElementById('greeting-email').textContent = user.email;
  }

  // ── LOGOUT ──
  function logout() {
    clearSession();
    document.getElementById('auth-forms').style.display = 'block';
    document.getElementById('user-greeting').style.display = 'none';
    clearMsg();
  }

  // ── CHECK SESSION ON LOAD ──
  window.addEventListener('load', function() {
    const session = getSession();
    if (session) showGreeting(session);
  });
</script>
</body>
</html>
